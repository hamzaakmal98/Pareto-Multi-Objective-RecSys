data:
  # point to the KuaiRand-1K snapshot under real_data for local full runs
  dir: real_data/KuaiRand-1K/data
  # if these are present they'll be used; otherwise loader will auto-detect common names
  interactions: log_random_4_22_to_5_08_1k.csv
  users: user_clusters.csv
  videos: ''
  video_stats: ''

target_cols: [is_like, long_view, is_follow]
timestamp_col: time_ms
id_cols: [user_id, video_id]

feature_groups:
  allowed: ["user_", "video_", "meta", "hist_"]
  banned: ["click", "watch", "exposure", "future", "outcome", "label_"]

impute:
  numeric: zero

test_frac: 0.15
val_frac: 0.15

processed_dir: data/processed
