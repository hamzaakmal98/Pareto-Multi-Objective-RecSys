data:
  path: data/KuaiRand-1K.csv
  target: is_like
  timestamp_col: timestamp

train:
  test_size: 0.2
  random_state: 42
  models: [logreg, lgbm, mlp]

models:
  logreg:
    C: 1.0
  lgbm:
    num_boost_round: 100
    learning_rate: 0.1
  mlp:
    epochs: 5
    batch_size: 128
    lr: 1e-3

output:
  dir: models
