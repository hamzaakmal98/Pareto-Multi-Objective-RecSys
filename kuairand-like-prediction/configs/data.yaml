data:
  dir: data
  interactions: KuaiRand-1K/interactions.csv
  users: KuaiRand-1K/users.csv
  videos: KuaiRand-1K/videos.csv
  video_stats: KuaiRand-1K/video_stats.csv

target_col: is_like
timestamp_col: timestamp
id_cols: [user_id, video_id]

feature_groups:
  allowed: ["user_", "video_", "meta", "hist_"]
  banned: ["click", "watch", "exposure", "future", "outcome", "label_"]

impute:
  numeric: zero

test_frac: 0.15
val_frac: 0.15

processed_dir: data/processed
